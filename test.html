<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>神经重塑训练</title>
    <!-- 必须的主题色和图标，解决华为/Chrome识别问题 -->
    <meta name="theme-color" content="#009688">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" sizes="180x180" href="https://cdn.jsdelivr.net/gh/eligrey/FileSaver.js@master/demo/icon.png">

    <!-- 内嵌manifest（浏览器可识别的有效格式，解决data:base64不兼容问题） -->
    <script type="application/json" id="pwa-manifest">
    {
        "name": "神经重塑训练",
        "short_name": "神经重塑",
        "description": "神经重塑康复训练工具",
        "start_url": "./",
        "display": "standalone",
        "background_color": "#121212",
        "theme_color": "#009688",
        "orientation": "portrait",
        "icons": [
            {
                "src": "https://cdn.jsdelivr.net/gh/eligrey/FileSaver.js@master/demo/icon.png",
                "sizes": "192x192",
                "type": "image/png",
                "purpose": "any maskable"
            },
            {
                "src": "https://cdn.jsdelivr.net/gh/eligrey/FileSaver.js@master/demo/icon.png",
                "sizes": "512x512",
                "type": "image/png",
                "purpose": "any maskable"
            }
        ]
    }
    </script>
    <link rel="manifest" href="data:application/json;base64,">
    <style>
        :root {
            --primary: #009688;
            --bg-dark: #121212;
            --bg-card: #1e1e1e;
            --text-light: #ffffff;
            --text-gray: #b0b0b0;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            padding: 1rem;
            padding-bottom: 120px;
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header h1 {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }
        .header p {
            color: var(--text-gray);
            font-size: 1.2rem;
        }
        .stage-card {
            background-color: var(--bg-card);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            text-align: center;
            border: 2px solid var(--primary);
        }
        .stage-title {
            font-size: 2rem;
            color: var(--text-gray);
        }
        .track-list {
            background-color: var(--bg-card);
            border-radius: 16px;
            padding: 1.5rem;
        }
        .track-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            margin-bottom: 0.8rem;
            background-color: #2a2a2a;
            border-radius: 12px;
        }
        .track-info {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .track-number {
            color: var(--primary);
            font-size: 1.5rem;
            font-weight: bold;
        }
        .track-name {
            font-size: 1.3rem;
        }
        .track-meta {
            color: var(--text-gray);
            font-size: 0.9rem;
            margin-top: 0.3rem;
        }
        .config-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 20px;
            font-size: 1rem;
            cursor: pointer;
        }
        .mini-player {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #1e1e1e;
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid #333;
        }
        .player-controls {
            display: flex;
            gap: 1rem;
        }
        .control-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }
        #pwaInstallHint {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background-color: var(--primary);
            color: white;
            padding: 0.8rem 1.2rem;
            border-radius: 20px;
            font-size: 0.9rem;
            display: none;
            z-index: 999;
        }
        #pwaInstallHint.show {
            display: block;
        }
    </style>
</head>
<body>
    <!-- PWA安装提示 -->
    <div id="pwaInstallHint">点击地址栏「安装」可添加到桌面</div>

    <div class="header">
        <h1>🧠 神经重塑训练</h1>
        <p>底部迷你播放器 · 始终可见</p>
    </div>

    <div class="stage-card">
        <div class="stage-title">当前阶段<br>准备开始</div>
    </div>

    <div class="track-list">
        <p style="font-size: 1.3rem; margin-bottom: 1rem;">🎵 训练曲目 · 点击行复制 | 点击「配置」调整</p>
        
        <div class="track-item">
            <div class="track-info">
                <div class="track-number">1.</div>
                <div>
                    <div class="track-name" style="color: var(--primary);">坐立战马</div>
                    <div class="track-meta">📁 本地 · 🌐 链接 · 04:30</div>
                </div>
            </div>
            <button class="config-btn">⚙️ 配置</button>
        </div>

        <div class="track-item">
            <div class="track-info">
                <div class="track-number">2.</div>
                <div>
                    <div class="track-name">飞檐走壁</div>
                    <div class="track-meta">📁 本地 · 🌐 链接 · 03:45</div>
                </div>
            </div>
            <button class="config-btn">⚙️ 配置</button>
        </div>
    </div>

    <!-- 底部迷你播放器 -->
    <div class="mini-player">
        <div style="display: flex; align-items: center; gap: 0.8rem;">
            <div style="width: 40px; height: 40px; background-color: var(--primary); border-radius: 8px;"></div>
            <div>
                <div style="font-size: 1rem;">坐立战马</div>
                <div style="font-size: 0.8rem; color: var(--text-gray);">01:23 / 04:30</div>
            </div>
        </div>
        <div class="player-controls">
            <button class="control-btn">⏮️</button>
            <button class="control-btn">▶️</button>
            <button class="control-btn">⏭️</button>
        </div>
    </div>

    <script>
        // 1. 动态加载manifest，解决单文件内嵌兼容性问题
        (function() {
            const manifestText = document.getElementById('pwa-manifest').textContent;
            const manifestBlob = new Blob([manifestText], { type: 'application/json' });
            const manifestUrl = URL.createObjectURL(manifestBlob);
            document.querySelector('link[rel="manifest"]').href = manifestUrl;
        })();

        // 2. 注册Service Worker（使用浏览器可识别的方式，解决单文件SW注册问题）
        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'neuro-rehab-v4';
                const CACHE_FILES = ['./'];
                self.addEventListener('install', e => {
                    e.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(CACHE_FILES)).then(() => self.skipWaiting()));
                });
                self.addEventListener('activate', e => {
                    e.waitUntil(caches.keys().then(keys => Promise.all(
                        keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k))
                    )).then(() => self.clients.claim()));
                });
                self.addEventListener('fetch', e => {
                    e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
                });
            `;
            const swBlob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(swBlob);
            navigator.serviceWorker.register(swUrl).then(reg => {
                console.log('✅ Service Worker 注册成功', reg);
            }).catch(err => {
                console.error('❌ Service Worker 注册失败', err);
            });
        }

        // 3. 监听beforeinstallprompt事件，触发安装提示
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // 显示安装提示
            document.getElementById('pwaInstallHint').classList.add('show');
            document.getElementById('pwaInstallHint').addEventListener('click', () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    deferredPrompt.userChoice.then((choiceResult) => {
                        if (choiceResult.outcome === 'accepted') {
                            console.log('✅ 用户接受了安装PWA');
                        } else {
                            console.log('❌ 用户拒绝了安装PWA');
                        }
                        deferredPrompt = null;
                        document.getElementById('pwaInstallHint').classList.remove('show');
                    });
                }
            });
        });

        // 4. 页面加载完成后自动触发提示（解决华为浏览器识别延迟问题）
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                if (deferredPrompt) {
                    document.getElementById('pwaInstallHint').classList.add('show');
                }
            }, 1500);
        });
    </script>
</body>
</html>
