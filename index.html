<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>神经重塑 · 训练控制器</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="神经重塑">
    <meta name="description" content="神经重塑PWA训练应用，支持蓝牙耳机双击三击控制与锁屏控制">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="screen-orientation" content="portrait">
    <meta name="x5-orientation" content="portrait">
    <meta name="x5-fullscreen" content="true">
    <meta name="x5-page-mode" content="app">
    <meta name="browsermode" content="application">
    <meta name="full-screen" content="yes">
    <meta name="layoutmode" content="fitscreen">
    <meta name="huawei" content="lockscreen-media-control">

    <style>
        :root { --g: #00d4aa; --b: #00a8e8; --bg: #0a0a0a; --bg2: #121212; --t: #fff; --t2: rgba(255,255,255,0.7); --tm: rgba(255,255,255,0.4); --d: #ff6b6b; --w: #ffd93d; --o: #00c853; }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans SC', sans-serif; background: var(--bg); min-height: 100dvh; color: var(--t); display: flex; flex-direction: column; align-items: center; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }

        /* Ambient background glow */
        body::before { content:''; position:fixed; inset:0; pointer-events:none; background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(100,80,200,0.12) 0%, transparent 70%), radial-gradient(ellipse 50% 30% at 80% 80%, rgba(80,60,180,0.06) 0%, transparent 70%); z-index:0; }

        /* Toast */
        .toast { position: fixed; top: 16px; right: 16px; background: rgba(26,26,46,0.95); border-radius: 30px; padding: 8px 18px; font-size: 12px; opacity: 0; transform: translateX(100%); transition: all 0.3s; backdrop-filter: blur(20px); z-index: 1000; white-space: nowrap; }
        .toast.show { opacity: 1; transform: translateX(0); }
        .toast.ok { border: 1px solid var(--o); color: var(--o); } .toast.err { border: 1px solid var(--d); color: var(--d); }

        /* Top hint */
        .top-hint { margin-top: 12px; font-size: 11px; color: var(--tm); text-align: center; z-index: 1; }

        /* Cover area */
        .cover-wrap { position: relative; width: 240px; height: 240px; margin: 16px auto 12px; z-index: 1; }
        .cover-wrap img { width: 100%; height: 100%; object-fit: cover; border-radius: 16px; animation: coverGlow 4s ease-in-out infinite; }
        @keyframes coverGlow { 0%,100%{box-shadow: 0 0 20px rgba(100,80,200,0.15),0 0 60px rgba(80,60,180,0.08)} 50%{box-shadow: 0 0 35px rgba(120,90,220,0.28),0 0 80px rgba(90,70,200,0.15)} }

        /* Progress ring around cover */
        .prog-ring { position: absolute; inset: -10px; pointer-events: none; }
        .prog-ring svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        .prog-ring circle { fill: none; stroke-width: 3; }
        .prog-ring .bg { stroke: rgba(255,255,255,0.06); }
        .prog-ring .bar { stroke: url(#grad); stroke-linecap: round; transition: stroke-dashoffset 0.5s; }

        /* Song info */
        .song-info { text-align: center; padding: 0 24px; z-index: 1; }
        .song-info .title { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
        .song-info .artist { font-size: 14px; color: var(--t2); margin-top: 4px; }

        /* Progress bar */
        .tbar { width: calc(100% - 48px); max-width: 380px; margin: 16px auto 12px; z-index: 1; }
        .tbar-track { height: 3px; background: rgba(255,255,255,0.15); border-radius: 3px; overflow: hidden; cursor: pointer; position: relative; }
        .tbar-fill { height: 100%; width: 0%; background: #fff; border-radius: 3px; pointer-events: none; }
        .tbar-dot { position: absolute; top: 50%; transform: translate(-50%,-50%); width: 10px; height: 10px; background: #fff; border-radius: 50%; box-shadow: 0 0 4px rgba(0,0,0,0.3); }
        .tbar-time { display: flex; justify-content: space-between; font-size: 11px; color: var(--tm); margin-top: 6px; font-variant-numeric: tabular-nums; }

        /* Player controls */
        .player-ctrls { display: flex; align-items: center; justify-content: center; gap: 24px; padding: 0 24px; z-index: 1; }
        .ctrl-btn { width: 44px; height: 44px; border-radius: 50%; border: none; background: transparent; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.15s; color: #fff; padding: 0; }
        .ctrl-btn:active { transform: scale(0.88); opacity: 0.7; }
        .ctrl-btn.play { width: 64px; height: 64px; background: #fff; color: #000; }
        .ctrl-btn.play svg { width: 28px; height: 28px; }
        .ctrl-btn svg { width: 22px; height: 22px; }
        .ctrl-btn.liked svg { fill: var(--o); stroke: var(--o); }

        /* Stage pills */
        .stage-pills { display: flex; gap: 8px; margin: 16px 24px 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; z-index: 1; }
        .stage-pills::-webkit-scrollbar { display: none; }
        .pill { flex-shrink: 0; padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 500; background: rgba(255,255,255,0.06); color: var(--tm); border: none; cursor: pointer; transition: all 0.2s; }
        .pill.on { background: rgba(255,255,255,0.12); color: #fff; }

        /* Expand panel for legacy features */
        .panel-toggle { display: flex; align-items: center; justify-content: center; gap: 6px; margin: 8px 0; color: var(--tm); font-size: 12px; cursor: pointer; z-index: 1; }
        .panel { display: none; width: 100%; max-width: 420px; padding: 0 16px; z-index: 1; }
        .panel.open { display: block; }

        /* Legacy styles - preserved for JS compatibility */
        .header { display: none; }
        .hint-box { display: none !important; }
        .diag { background: rgba(0,0,0,0.7); border: 1px solid var(--w); border-radius: 16px; padding: 16px; margin-bottom: 12px; backdrop-filter: blur(20px); display: none; }
        .diag.show { display: block; } .diag h4 { color: var(--w); margin-bottom: 12px; font-size: 14px; }
        .d-row { display: flex; justify-content: space-between; padding: 7px 0; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .d-label { color: var(--tm); } .d-val { color: var(--t2); }
        .hw-guide { display: none; background: rgba(0,212,170,0.1); border: 1px solid var(--g); border-radius: 16px; padding: 14px; margin: 8px 16px 12px; font-size: 12px; }
        .hw-guide.on { display: block; } .hw-guide .step { display: flex; align-items: center; gap: 8px; padding: 6px 0; } .hw-guide .snum { background: var(--g); color: #000; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
        .ms-hint { display: none; background: rgba(0,212,170,0.1); border: 1px solid var(--g); border-radius: 16px; padding: 12px; margin: 8px 16px; text-align: center; font-size: 12px; color: var(--g); }
        .ms-hint.on { display: block; }
        .music-stat { display: none; }
        .file-in { background: rgba(255,255,255,0.03); border-radius: 16px; padding: 16px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.06); }
        .f-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; padding: 12px; background: rgba(0,0,0,0.2); border-radius: 12px; cursor: pointer; }
        .f-info { flex: 1; } .f-name { color: var(--t2); font-size: 13px; } .f-name.on { color: var(--g); } .f-meta { font-size: 11px; color: var(--tm); }
        .cfg-btn { padding: 6px 14px; background: rgba(0,168,232,0.15); border: 1px solid var(--b); border-radius: 20px; color: var(--b); cursor: pointer; font-size: 11px; }
        .stage { background: rgba(255,255,255,0.03); border-radius: 16px; padding: 16px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .stage .num { display: inline-block; background: linear-gradient(90deg, var(--g), var(--b)); color: #000; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; }
        .stage .title { font-size: 18px; margin: 8px 0 4px; font-weight: 700; }
        .stage .detail { font-size: 12px; color: var(--t2); line-height: 1.6; white-space: pre-line; }
        .ctrls { display: flex; gap: 10px; margin-bottom: 12px; justify-content: center; }
        .btn { padding: 10px 24px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); font-size: 14px; font-weight: 600; cursor: pointer; background: rgba(255,255,255,0.06); color: #fff; }
        .btn:active { transform: scale(0.95); }
        .btn-p { background: linear-gradient(135deg, var(--g), var(--b)); color: #000; border: none; }
        .btn-d { background: rgba(255,107,107,0.12); border-color: var(--d); color: var(--d); }
        .vol-row { display: flex; align-items: center; gap: 12px; margin: 8px 0; padding: 10px 14px; background: rgba(0,0,0,0.2); border-radius: 12px; }
        .vol-row label { font-size: 12px; color: var(--t2); width: 60px; }
        .vol-row input[type="range"] { flex: 1; -webkit-appearance: none; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; outline: none; }
        .vol-row input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: #fff; border-radius: 50%; cursor: pointer; }
        .vol-row .val { font-size: 12px; color: var(--g); width: 36px; text-align: right; }
        .playlist { margin-bottom: 12px; }
        .track { display: flex; align-items: center; padding: 10px 12px; border-radius: 10px; margin-bottom: 4px; background: rgba(255,255,255,0.02); cursor: pointer; }
        .track.on { background: rgba(0,212,170,0.12); } .track .num { width: 24px; height: 24px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; margin-right: 10px; } .track.on .num { background: var(--g); color: #000; } .track .info { flex: 1; } .track .info div { font-size: 13px; }
        .stats { background: rgba(255,255,255,0.03); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; } .card { background: rgba(0,0,0,0.3); border-radius: 12px; padding: 14px 8px; text-align: center; } .card .val { font-size: 28px; font-weight: 700; color: var(--g); } .card .lbl { font-size: 11px; color: var(--tm); }
        .tabs { display: flex; gap: 8px; margin-bottom: 12px; justify-content: center; } .tab { padding: 6px 16px; background: rgba(255,255,255,0.04); border-radius: 20px; cursor: pointer; font-size: 12px; } .tab.on { background: rgba(0,212,170,0.2); color: var(--g); font-weight: 600; }
        .toggle { position: relative; width: 44px; height: 26px; background: rgba(255,255,255,0.2); border-radius: 26px; cursor: pointer; } .toggle.on { background: var(--g); } .toggle::after { content: ''; position: absolute; top: 3px; left: 3px; width: 20px; height: 20px; background: #fff; border-radius: 50%; transition: transform 0.3s; } .toggle.on::after { transform: translateX(18px); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; z-index: 2000; } .modal.on { display: flex; }
        .modal-box { background: linear-gradient(135deg,#1e1e3a,#16213e); border-radius: 20px; padding: 24px; width: 92%; max-width: 400px; max-height: 85dvh; overflow-y: auto; border: 1px solid var(--g); }
        .p-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; } .p-row label { width: 60px; font-size: 12px; color: var(--t2); } .p-row input { flex: 1; padding: 10px 12px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 12px; font-size: 14px; outline: none; }
        .modal-act { display: flex; gap: 10px; margin-top: 20px; }
        .foot { background: rgba(255,255,255,0.03); border-radius: 16px; padding: 16px; margin-bottom: 90px; }
        .ghost { opacity: 0.4; background: rgba(0,212,170,0.2); border: 2px dashed var(--g) !important; }

        /* Mini player */
        .mini { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(18,18,18,0.98); border-top: 1px solid rgba(255,255,255,0.06); padding: 10px 18px env(safe-area-inset-bottom,10px); display: flex; align-items: center; gap: 14px; z-index: 1500; }
        .mini .info { flex: 1; } .mini .title { font-size: 14px; font-weight: 600; } .mini .sub { font-size: 11px; color: var(--tm); }
        .m-btn { width: 40px; height: 40px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; background: rgba(255,255,255,0.08); color: #fff; } .m-play { width: 48px; height: 48px; background: linear-gradient(135deg, var(--g), var(--b)); color: #000; font-size: 20px; }

        /* Animations */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px) } to { opacity: 1; transform: translateY(0) } }
        .anim-1 { animation: fadeInUp 0.5s ease-out 0.1s both; }
        .anim-2 { animation: fadeInUp 0.5s ease-out 0.2s both; }
        .anim-3 { animation: fadeInUp 0.5s ease-out 0.3s both; }
        .anim-4 { animation: fadeInUp 0.5s ease-out 0.4s both; }
        .anim-5 { animation: fadeInUp 0.5s ease-out 0.5s both; }

        @media (max-width: 360px) { .cover-wrap { width: 200px; height: 200px; } .song-info .title { font-size: 18px; } }
    </style>
</head>
<body>
    <div class="toast ok" id="tOk"></div><div class="toast err" id="tErr"></div>

    <p class="top-hint anim-1" id="msHint">锁屏控制已激活 · 蓝牙耳机可用</p>

    <!-- Cover with progress ring -->
    <div class="cover-wrap anim-2">
        <svg class="prog-ring" viewBox="0 0 260 260">
            <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#8b7dd4"/><stop offset="100%" stop-color="#5b9bd5"/></linearGradient></defs>
            <circle class="bg" cx="130" cy="130" r="125"/>
            <circle class="bar" cx="130" cy="130" r="125" stroke-dasharray="785.4" stroke-dashoffset="785.4"/>
        </svg>
        <img src="./cover.jpg" alt="神经重塑" draggable="false">
    </div>

    <!-- Song info -->
    <div class="song-info anim-3">
        <div class="title" id="stTitle">坐立战马</div>
        <div class="artist" id="curMode">准备开始 · 阶段 <span id="stNum">1/5</span></div>
    </div>

    <!-- Progress bar -->
    <div class="tbar anim-3">
        <div class="tbar-track" id="tbar"><div class="tbar-fill" id="tbarFill" style="width:0%"></div><div class="tbar-dot" id="tbarDot" style="left:0%"></div></div>
        <div class="tbar-time"><span id="tbarCur">00:00</span><span id="tbarDur">00:00</span></div>
    </div>

    <!-- Player controls -->
    <div class="player-ctrls anim-4">
        <button class="ctrl-btn" id="likeBtn" title="收藏">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
        <button class="ctrl-btn" id="mPrev" title="上一首">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button class="ctrl-btn play" id="playBtn" title="播放/暂停">
            <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            <svg id="pauseIcon" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="ctrl-btn" id="mNext" title="下一首">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
        <button class="ctrl-btn" id="lyricBtn" title="想象提示">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </button>
    </div>

    <!-- Stage pills -->
    <div class="stage-pills anim-5" id="stagePills"></div>

    <!-- Expand panel toggle -->
    <div class="panel-toggle anim-5" onclick="document.getElementById('detailPanel').classList.toggle('open');this.querySelector('span').textContent=document.getElementById('detailPanel').classList.contains('open')?'▲':'▼'">
        <span>▼</span> 更多设置
    </div>

    <!-- Expandable detail panel -->
    <div class="panel" id="detailPanel">
        <div class="stage" id="stageInfo">
            <span class="num" id="stNum2">阶段 1/5</span>
            <div class="title" id="stTitle2">坐立战马</div>
            <div class="detail" id="stDetail"></div>
        </div>

        <div class="file-in">
            <h4 style="color:var(--t2);margin-bottom:10px;font-size:12px">训练曲目</h4>
            <div id="fileRows"></div>
        </div>

        <div class="file-in">
            <h4 style="color:var(--t2);margin-bottom:8px;font-size:12px">音量</h4>
            <div class="vol-row"><label>主音量</label><input type="range" id="mainVol" min="0" max="100" value="80"><span class="val" id="mainVolVal">80%</span></div>
            <div class="vol-row"><label>节拍器</label><input type="range" id="metroVol" min="0" max="100" value="30"><span class="val" id="metroVolVal">30%</span></div>
        </div>

        <div class="ctrls">
            <button class="btn btn-p" id="resetBtn">↻ 重置</button>
            <button class="btn" id="exportBtn">⬇ 导出</button>
        </div>

        <div class="playlist"><h3 style="color:var(--t2);margin-bottom:8px;font-size:12px">训练列表</h3><div id="plist"></div></div>

        <div class="stats">
            <h4 style="color:var(--t2);margin-bottom:12px;font-size:13px">训练统计</h4>
            <div class="grid">
                <div class="card"><div class="val" id="stSess">0</div><div class="lbl">完成次数</div></div>
                <div class="card"><div class="val" id="stMin">0</div><div class="lbl">总分钟</div></div>
                <div class="card"><div class="val" id="stStrk">0</div><div class="lbl">连续天数</div></div>
                <div class="card"><div class="val" id="stLast">-</div><div class="lbl">上次</div></div>
            </div>
            <div class="tabs"><div class="tab on" data-t="weekly">本周</div><div class="tab" data-t="monthly">本月</div><div class="tab" data-t="yearly">全年</div></div>
            <div style="height:160px"><canvas id="chart"></canvas></div>
        </div>

        <div class="foot">
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
                <div class="toggle on" id="autoSave"></div><span style="font-size:13px">自动保存</span>
            </div>
            <div style="display:flex;gap:10px">
                <button class="btn" id="importBtn" style="padding:8px 16px;font-size:12px;flex:1">📂 导入</button>
                <button class="btn btn-d" id="clearBtn" style="padding:8px 16px;font-size:12px;flex:1">🗑 清除</button>
            </div>
        </div>

        <!-- Hidden elements for JS compatibility -->
        <div style="display:none">
            <div id="curTime">00:00</div><div id="totTime">/ 30:00</div>
            <svg width="0" height="0"><circle class="bar" cx="80" cy="80" r="72" stroke-dasharray="452.39" stroke-dashoffset="452.39"/></svg>
        </div>
    </div>

    <!-- Diag panel -->
    <div class="diag" id="diag" style="margin:0 16px 12px">
        <h4>诊断</h4>
        <div class="d-row"><span class="d-label">蓝牙耳机</span><span class="d-val" id="dBt">检测中...</span></div>
        <div class="d-row"><span class="d-label">MediaSession</span><span class="d-val" id="dMs">检测中...</span></div>
        <div class="d-row"><span class="d-label">播放状态</span><span class="d-val" id="dPlay">检测中...</span></div>
        <div class="d-row"><span class="d-label">系统</span><span class="d-val" id="dSys">检测中...</span></div>
        <div style="margin-top:12px"><button class="btn" style="width:100%;padding:10px;font-size:12px" onclick="document.getElementById('diag').classList.remove('show')">关闭</button></div>
    </div>

    <input type="file" id="impFile" accept=".json" style="display:none">

    <!-- Mini player -->
    <div class="mini">
        <div class="info"><div class="title" id="mTitle">坐立战马</div><div class="sub" id="mSub">准备开始</div></div>
        <div style="display:flex;gap:8px">
            <button class="m-btn" id="mPrev2">⏮</button>
            <button class="m-btn m-play" id="mPlay">▶</button>
            <button class="m-btn" id="mNext2">⏭</button>
        </div>
    </div>

    <!-- Config modal -->
    <div class="modal" id="cfgModal">
        <div class="modal-box">
            <h3 id="cfgTitle">配置</h3>
            <div class="p-row"><label>名称</label><input type="text" id="cName"></div>
            <div class="p-row"><label>BPM</label><input type="number" id="cBpm" min="30" max="200"></div>
            <div class="p-row"><label>时长(秒)</label><input type="number" id="cDur" min="0" max="7200"></div>
            <div style="margin-bottom:12px">
                <div style="display:flex;gap:8px;margin-top:8px">
                    <button class="btn" id="selLoc" style="padding:8px 12px;font-size:11px">📁 本地</button>
                    <button class="btn" id="selNet" style="padding:8px 12px;font-size:11px">🔗 链接</button>
                </div>
                <input type="file" id="locFile" accept="audio/*" style="display:none">
            </div>
            <div class="modal-act">
                <button class="btn btn-p" id="saveCfg" style="flex:1">保存</button>
                <button class="btn" id="canCfg" style="flex:1">取消</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <script>
    // ============================================================
    // 神经重塑 v7.2 - 蓝牙耳机控制完整版
    // MediaSession + 华为耳机双击/三击 + 蓝牙状态监听
    // 全部内联，无外部依赖，统一调用链
    // ============================================================
    (function() {
        'use strict';

        const VER = '7.2.0';
        const $ = id => document.getElementById(id);
        const log = (...a) => console.log('[NR]', ...a);
        const err = msg => { console.error('[NR]', msg); toast('tErr', '⚠ ' + msg); };
        const ok = msg => toast('tOk', '✓ ' + msg);
        function toast(id, msg, dur = 3000) { const el = $(id); if (!el) return; el.textContent = msg; el.classList.add('show'); clearTimeout(el._to); el._to = setTimeout(() => el.classList.remove('show'), dur); }
        function esc(s) { const d = document.createElement('div'); d.textContent = String(s == null ? '' : s); return d.innerHTML; }

        // ========== 常量 ==========
        const KEYS = { STAGES: 'nr_s72', STATE: 'nr_d72', AUTO: 'nr_a72', STATS: 'nr_r72' };
        const DB_CONF = { NAME: 'NADB72', STORE: 'audio', VER: 1 };
        const DEF = [
            { name: "坐立战马", bpm: 72, duration: 300, action: "坐位平衡，双手扶膝", imagine: "想象骑战马" },
            { name: "飞檐走壁", bpm: 108, duration: 420, action: "站立位，重心左右移", imagine: "想象飞檐走壁" },
            { name: "行云流水", bpm: 66, duration: 360, action: "慢步行走，摆臂自然", imagine: "想象行云流水" },
            { name: "凌波微步", bpm: 82, duration: 360, action: "加快速度，小步跑", imagine: "想象凌波微步" },
            { name: "脑体合一", bpm: 60, duration: 360, action: "站立深呼吸，闭眼", imagine: "想象脑体合一" }
        ];
        const CIRC = 452.39;
        const CIRC2 = 785.4;

        // ========== 状态 ==========
        let stages = JSON.parse(JSON.stringify(DEF));
        let cur = 0, playing = false, total = 0, saved = 0;
        let actx = null, curAud = null, auto = true;
        let chart = null, chartType = 'weekly';
        let meta = [null, null, null, null, null];
        let stats = { sessions: [], totalSessions: 0, totalMinutes: 0, currentStreak: 0, lastDate: null, daily: {} };
        let editIdx = 0, tmpFile = null, tmpUrl = '';
        let sortable = null, loop = null, mIval = null, mProg = null, mStart = 0;
        let bgOsc = null, bgGain = null, wlock = null;
        let mainVol = 0.8, metroVol = 0.3;
        let msInit = false, sessAud = null, pulseUrl = null;
        let liked = false;

        // ========== 系统检测 ==========
        const UA = navigator.userAgent.toLowerCase();
        const isHw = /huawei|honor/.test(UA);
        const isHm = /harmonyos|openharmony/.test(UA) || (isHw && !/android/.test(UA));
        const isIos = /iphone|ipad|ipod/.test(UA);
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone === true;

        // ========== 蓝牙/耳机检测状态 ==========
        let btConnected = false;
        let btDeviceName = null;
        let lastActionMs = 0;
        const ACTION_COOLDOWN = 300;

        // ============================================================
        // 1. 音频基础
        // ============================================================
        function fmtTime(s) { if (!Number.isFinite(s) || s < 0) s = 0; const m = Math.floor(s / 60), sec = Math.floor(s % 60); return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0'); }
        function totalDur() { return stages.reduce((a, s) => a + (Number(s.duration) || 0), 0); }
        function stageStart(i) { let t = 0; for (let j = 0; j < i; j++) t += stages[j]?.duration || 0; return t; }

        async function ensureAC() {
            if (!actx || actx.state === 'closed') {
                const AC = window.AudioContext || window.webkitAudioContext;
                if (!AC) throw new Error('No Web Audio');
                actx = new AC({ latencyHint: 'interactive', sampleRate: 44100 });
            }
            if (actx.state === 'suspended') await actx.resume();
            return actx;
        }

        // ========== IndexedDB ==========
        async function openDB() {
            return new Promise((res, rej) => {
                try {
                    const r = indexedDB.open(DB_CONF.NAME, DB_CONF.VER);
                    r.onerror = () => rej(r.error);
                    r.onsuccess = () => res(r.result);
                    r.onupgradeneeded = e => { if (!e.target.result.objectStoreNames.contains(DB_CONF.STORE)) e.target.result.createObjectStore(DB_CONF.STORE, { keyPath: 'id' }); };
                    r.onblocked = () => rej(new Error('DB blocked'));
                } catch (e) { rej(e); }
            });
        }
        async function dbPut(id, file) {
            const db = await openDB();
            return new Promise((res, rej) => {
                const rd = new FileReader();
                rd.onload = () => {
                    const tx = db.transaction([DB_CONF.STORE], 'readwrite');
                    tx.objectStore(DB_CONF.STORE).put({ id, name: file.name, type: file.type, size: file.size, data: rd.result, ts: Date.now() });
                    tx.oncomplete = () => res();
                    tx.onerror = () => rej(tx.error);
                };
                rd.onerror = () => rej(rd.error);
                rd.readAsArrayBuffer(file);
            });
        }
        async function dbGet(id) {
            try { const db = await openDB(); return new Promise((res, rej) => { const tx = db.transaction([DB_CONF.STORE], 'readonly'); const r = tx.objectStore(DB_CONF.STORE).get(id); r.onsuccess = () => res(r.result || null); r.onerror = () => rej(r.error); }); }
            catch (e) { return null; }
        }
        async function dbDel(id) { try { const db = await openDB(); return new Promise(r => { const tx = db.transaction([DB_CONF.STORE], 'readwrite'); tx.objectStore(DB_CONF.STORE).delete(id); tx.oncomplete = () => r(); }); } catch (e) {} }
        async function dbClear() { try { const db = await openDB(); return new Promise(r => { const tx = db.transaction([DB_CONF.STORE], 'readwrite'); tx.objectStore(DB_CONF.STORE).clear(); tx.oncomplete = () => r(); }); } catch (e) {} }

        // ========== 图标 ==========
        function genIcon() {
            const c = document.createElement('canvas'); c.width = 512; c.height = 512;
            const x = c.getContext('2d');
            x.fillStyle = '#1a1a2e'; x.beginPath(); x.roundRect(0, 0, 512, 512, 80); x.fill();
            x.strokeStyle = '#00d4aa'; x.lineWidth = 14;
            x.beginPath(); x.arc(256, 256, 204, 0, Math.PI * 2); x.stroke();
            x.strokeStyle = '#00d4aa'; x.lineWidth = 10; x.lineCap = 'round';
            [[256,212,256,144],[300,256,368,256],[256,300,256,368],[212,256,144,256]].forEach(l => { x.beginPath(); x.moveTo(l[0], l[1]); x.lineTo(l[2], l[3]); x.stroke(); });
            x.fillStyle = '#00d4aa'; x.beginPath(); x.arc(256, 256, 44, 0, Math.PI * 2); x.fill();
            [[256,120],[392,256],[256,392],[120,256]].forEach(p => { x.fillStyle = '#00d4aa'; x.beginPath(); x.arc(p[0], p[1], 24, 0, Math.PI * 2); x.fill(); });
            return c.toDataURL('image/png');
        }

        // MediaSession artwork 必须用 HTTPS URL（data URL 锁屏进程不支持）
        function getIconUrl(size) {
            return new URL('./icons/icon-' + size + 'x' + size + '.png', location.href).href;
        }

        // ============================================================
        // 2. MediaSession + 蓝牙耳机控制（核心，统一初始化）
        // ============================================================
        async function initMediaSession() {
            if (!('mediaSession' in navigator)) { log('MediaSession 不可用'); return; }
            if (msInit) return;
            log('=== 初始化 MediaSession + 耳机控制 ===');

            // 预加载图标 URL
            log('图标 URL:', getIconUrl(192));

            // 注册全部 8 个标准动作
            const set = (name, fn) => { try { navigator.mediaSession.setActionHandler(name, fn); log('  ✅ ' + name); } catch (e) { log('  ⚠️ ' + name, e.message); } };

            set('play', () => handleMediaAction('play'));
            set('pause', () => handleMediaAction('pause'));
            set('previoustrack', () => handleMediaAction('previoustrack'));
            set('nexttrack', () => handleMediaAction('nexttrack'));
            set('stop', () => handleMediaAction('stop'));
            set('seekbackward', (d) => handleMediaAction('seekbackward', d));
            set('seekforward', (d) => handleMediaAction('seekforward', d));
            set('seekto', (d) => handleMediaAction('seekto', d));

            // 设置初始元数据（artwork 必须用 HTTPS URL，data URL 锁屏不可访问）
            try {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: '神经重塑训练',
                    artist: '准备开始',
                    album: 'PWA',
                    artwork: [
                        { src: new URL('./cover.jpg', location.href).href, sizes: '512x512', type: 'image/jpeg' },
                        { src: getIconUrl(192), sizes: '192x192', type: 'image/png' },
                        { src: getIconUrl(128), sizes: '128x128', type: 'image/png' },
                        { src: getIconUrl(96), sizes: '96x96', type: 'image/png' }
                    ]
                });
                navigator.mediaSession.playbackState = 'paused';
            } catch (e) { log('设置初始元数据失败:', e); }

            msInit = true;
            log('MediaSession 初始化完成');
        }

        // 统一处理 MediaSession 动作（带防抖动、点击模式分析）
        function handleMediaAction(action, details) {
            const now = Date.now();
            if (now - lastActionMs < ACTION_COOLDOWN) { log(`[${action}] 冷却中`); return; }
            lastActionMs = now;
            log(`[${action}] 触发`, details || '');

            // 记录时间戳用于双击/三击检测
            recordActionTimestamp(action);

            // 立即执行基本操作（不等待三击判定）
            switch (action) {
                case 'play': if (!playing) togglePlay(); break;
                case 'pause': if (playing) doPause(); break;
                case 'previoustrack': prevTrack(); break;
                case 'nexttrack': nextTrack(); break;
                case 'stop': if (playing) doPause(); break;
                case 'seekbackward':
                    if (curAud?.duration) curAud.currentTime = Math.max(0, curAud.currentTime - (details?.seekOffset || 10));
                    else total = Math.max(0, total - 10);
                    break;
                case 'seekforward':
                    if (curAud?.duration) curAud.currentTime = Math.min(curAud.duration, curAud.currentTime + (details?.seekOffset || 10));
                    else total = Math.min(totalDur(), total + 10);
                    break;
                case 'seekto':
                    if (details?.seekTime != null && curAud?.duration) curAud.currentTime = details.seekTime;
                    break;
            }

            // 更新元数据
            updateMS();
        }

        // ========== 双击/三击检测引擎 ==========
        const actionTimestamps = {};  // action -> 时间戳数组
        const actionTimeouts = {};    // action -> 定时器
        const DBL_THRESHOLD = 500;    // 双击间隔 ms
        const TRIPLE_THRESHOLD = 700; // 三击判定窗口 ms

        function recordActionTimestamp(action) {
            if (!actionTimestamps[action]) actionTimestamps[action] = [];
            const queue = actionTimestamps[action];
            queue.push(Date.now());

            // 清理超时的
            const cutoff = Date.now() - TRIPLE_THRESHOLD;
            while (queue.length && queue[0] < cutoff) queue.shift();

            // 清除之前的判定定时器
            if (actionTimeouts[action]) clearTimeout(actionTimeouts[action]);

            // 设置新的判定定时器
            actionTimeouts[action] = setTimeout(() => {
                const clicks = queue.length;
                queue.length = 0;
                if (clicks >= 3) {
                    log(`🔥 检测到 ${action} 三击!`);
                    onTripleClick(action);
                } else if (clicks === 2) {
                    log(`🔥 检测到 ${action} 双击!`);
                    onDoubleClick(action);
                }
            }, TRIPLE_THRESHOLD);
        }

        function onDoubleClick(action) {
            // 华为 FreeBuds 双击映射
            // 双击右耳 = nexttrack → 下一首
            // 双击左耳 = previoustrack → 上一首
            switch (action) {
                case 'nexttrack': log('🎧 双击右耳 → 下一首'); nextTrack(); break;
                case 'previoustrack': log('🎧 双击左耳 → 上一首'); prevTrack(); break;
                case 'play': case 'pause': log('🎧 双击 → 播放/暂停'); togglePlay(); break;
            }
            updateMS();
        }

        function onTripleClick(action) {
            // 三击映射为回退/快进
            switch (action) {
                case 'previoustrack': log('🎧 三击 → 上一首'); prevTrack(); break;
                case 'nexttrack': log('🎧 三击 → 下一首'); nextTrack(); break;
            }
            updateMS();
        }

        // ========== 更新 MediaSession 元数据和状态 ==========
        async function updateMS() {
            if (!('mediaSession' in navigator)) return;
            try {
                const s = stages[cur];
                const m = meta[cur];
                const prefix = playing ? '▶ ' : '⏸ ';

                navigator.mediaSession.metadata = new MediaMetadata({
                    title: prefix + (s?.name || '神经重塑'),
                    artist: m?.name || '训练播放',
                    album: '阶段' + (cur + 1) + '/5 · ' + (s?.bpm || 60) + 'BPM',
                    artwork: [
                        { src: new URL('./cover.jpg', location.href).href, sizes: '512x512', type: 'image/jpeg' },
                        { src: getIconUrl(192), sizes: '192x192', type: 'image/png' },
                        { src: getIconUrl(128), sizes: '128x128', type: 'image/png' },
                        { src: getIconUrl(96), sizes: '96x96', type: 'image/png' }
                    ]
                });
                navigator.mediaSession.playbackState = playing ? 'playing' : 'paused';
                // 华为/鸿蒙：强制刷新 playbackState
                if (isHm || isHw) {
                    navigator.mediaSession.playbackState = playing ? 'playing' : 'paused';
                }
            } catch (e) { log('updateMS 失败:', e.message); }
        }

        function updateMSPos(pos, dur) {
            if (!('mediaSession' in navigator) || !('setPositionState' in navigator.mediaSession)) return;
            try {
                const p = pos !== undefined ? pos : (curAud?.currentTime || 0);
                const d = dur !== undefined ? dur : (curAud?.duration || stages[cur]?.duration || 0);
                if (d > 0 && Number.isFinite(d)) {
                    navigator.mediaSession.setPositionState({
                        duration: Math.round(d),
                        playbackRate: playing ? 1.0 : 0.0,
                        position: Math.max(0, Math.min(Math.round(p), Math.round(d)))
                    });
                }
            } catch (e) {}
        }

        // ============================================================
        // 3. 蓝牙设备监听
        // ============================================================
        async function initBluetoothMonitor() {
            log('初始化蓝牙监听...');

            // 方法1: enumerateDevices 检测蓝牙音频输出
            async function checkOutputs() {
                try {
                    const devices = await navigator.mediaDevices.enumerateDevices();
                    const audioOuts = devices.filter(d => d.kind === 'audiooutput');
                    const bt = audioOuts.find(d => /bluetooth|bt|freebuds|airpods|earbuds|headphone|headset|无线/i.test(d.label));

                    const wasConnected = btConnected;
                    btConnected = !!bt;
                    btDeviceName = bt ? bt.label : null;

                    if (bt && !wasConnected) {
                        log('🎧 蓝牙设备已连接:', btDeviceName);
                        ok('蓝牙耳机已连接: ' + btDeviceName);
                    } else if (!bt && wasConnected) {
                        log('🎧 蓝牙设备已断开');
                    }
                    updateDiag();
                } catch (e) {}
            }

            await checkOutputs();

            // 监听设备变化
            if (navigator.mediaDevices) {
                navigator.mediaDevices.addEventListener('devicechange', checkOutputs);
            }

            // 定期检测
            setInterval(checkOutputs, 5000);
        }

        // ============================================================
        // 4. 音频播放控制
        // ============================================================
        function stopAll() {
            stopBG(); stopMetro();
            if (curAud) { try { curAud.pause(); curAud.removeAttribute('src'); curAud.load(); } catch (e) {} curAud = null; }
        }
        function stopBG() { try { bgOsc?.stop(); } catch (e) {} try { bgGain?.disconnect(); } catch (e) {} bgOsc = null; bgGain = null; }
        function stopMetro() { if (mIval) clearInterval(mIval); mIval = null; if (mProg) clearInterval(mProg); mProg = null; }

        function getAudDur(file) {
            return new Promise(res => {
                const a = new Audio(); a.preload = 'metadata'; let done = false;
                const t = setTimeout(() => { if (!done) { done = true; res(0); } }, 5000);
                a.onloadedmetadata = () => { if (!done) { done = true; clearTimeout(t); res(Math.round(a.duration) || 0); } };
                a.onerror = () => { if (!done) { done = true; clearTimeout(t); res(0); } };
                a.src = URL.createObjectURL(file);
            });
        }

        function clickMetro() {
            if (!actx || actx.state !== 'running') return;
            try {
                const o = actx.createOscillator(), g = actx.createGain();
                o.connect(g); g.connect(actx.destination);
                o.frequency.value = 1000;
                const n = actx.currentTime;
                g.gain.setValueAtTime(metroVol * 0.5, n);
                g.gain.exponentialRampToValueAtTime(0.001, n + 0.08);
                o.start(n); o.stop(n + 0.08);
            } catch (e) {}
        }

        function startMetro(bpm) {
            stopMetro();
            const dur = stages[cur]?.duration || 300;
            $('tbarDur').textContent = fmtTime(dur);
            $('tbarCur').textContent = '00:00';
            $('tbarFill').style.width = '0%';
            if ($('tbarDot')) $('tbarDot').style.left = '0%';
            mStart = performance.now();
            clickMetro();
            mIval = setInterval(() => { if (playing) clickMetro(); }, (60 / bpm) * 1000);
            mProg = setInterval(() => {
                if (!playing) return;
                const e = (performance.now() - mStart) / 1000;
                const p = Math.min((e / dur) * 100, 100);
                $('tbarFill').style.width = p + '%';
                if ($('tbarDot')) $('tbarDot').style.left = p + '%';
                $('tbarCur').textContent = fmtTime(e);
                updateMSPos(e, dur);
                if (e >= dur) { stopMetro(); nextStage(); }
            }, 50);
        }

        // ========== 媒体音频（MediaSession 激活关键）==========
        // 华为/鸿蒙系统要求：
        // 1. audio 元素必须在 DOM 中可见（不能 visibility:hidden）
        // 2. controls=true 系统才能识别为媒体播放器
        // 3. 音量不能太低（<0.1 系统可能忽略）
        // 4. 音频必须先于 MediaSession 设置播放
        // 5. 使用 data URL 避免 blob URL 在系统进程中失效

        // 极小的 base64 WAV（1秒静音，系统可检测到但人耳听不到）
        const SILENCE_WAV = 'data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQQAAAAAAA=='; // 约200字节，1秒静音

        function getSessAudio() {
            if (!sessAud) {
                sessAud = document.createElement('audio');
                sessAud.id = '__session_audio';
                sessAud.crossOrigin = 'anonymous';
                sessAud.setAttribute('x5-video-player-type', 'h5');
                sessAud.setAttribute('x5-video-player-fullscreen', 'false');
                sessAud.setAttribute('playsinline', '');
                sessAud.setAttribute('webkit-playsinline', '');
                sessAud.controls = true;     // 必须！系统识别媒体播放器的关键
                sessAud.loop = true;          // 循环保持 MediaSession
                sessAud.muted = false;
                sessAud.volume = 0.3;         // 华为系统最低检测阈值 ~0.1
                sessAud.preload = 'auto';
                // 可见但极透明（opacity>0, 不设置 visibility:hidden）
                sessAud.style.cssText = 'position:fixed;bottom:0;left:0;width:100%;height:2px;opacity:0.01;pointer-events:none;z-index:9999;';
                sessAud.src = SILENCE_WAV;
                document.body.appendChild(sessAud);
                log('媒体音频元素已创建（可见+controls）');
            }
            return sessAud;
        }

        async function startSessAudio() {
            try {
                const a = getSessAudio();
                a.muted = false;
                a.volume = 0.3;
                a.loop = true;
                a.currentTime = 0;
                await a.play();
                log('媒体音频已开始播放（音量0.3）');
            } catch (e) { log('媒体音频启动失败:', e.message); }
        }
        function stopSessAudio() {
            if (sessAud && !sessAud.paused) { try { sessAud.pause(); sessAud.currentTime = 0; } catch (e) {} }
        }

        async function playMusic(idx, resume) {
            stopAll();
            const m = meta[idx], s = stages[idx];
            if (m?.localFile) {
                try {
                    const entry = await dbGet(idx);
                    if (entry?.data) {
                        const blob = new Blob([entry.data], { type: entry.type || 'audio/mpeg' });
                        curAud = new Audio(URL.createObjectURL(blob));
                        curAud.loop = true; curAud.setAttribute('playsinline', ''); curAud.volume = mainVol;
                        curAud.addEventListener('timeupdate', () => {
                            if (!curAud?.duration) return;
                            $('tbarFill').style.width = ((curAud.currentTime / curAud.duration) * 100) + '%';
                            if ($('tbarDot')) $('tbarDot').style.left = ((curAud.currentTime / curAud.duration) * 100) + '%';
                            $('tbarCur').textContent = fmtTime(curAud.currentTime);
                            $('tbarDur').textContent = fmtTime(curAud.duration);
                            updateMSPos(curAud.currentTime, curAud.duration);
                        });
                        return await doPlay(resume, s.name + ' · 📁');
                    }
                } catch (e) { log('本地播放失败:', e); }
            }
            if (m?.onlineUrl) {
                try {
                    curAud = new Audio(m.onlineUrl); curAud.crossOrigin = 'anonymous'; curAud.loop = true;
                    curAud.setAttribute('playsinline', ''); curAud.volume = mainVol;
                    curAud.addEventListener('timeupdate', () => { if (curAud?.duration) { $('tbarFill').style.width = ((curAud.currentTime / curAud.duration) * 100) + '%'; if ($('tbarDot')) $('tbarDot').style.left = ((curAud.currentTime / curAud.duration) * 100) + '%'; $('tbarCur').textContent = fmtTime(curAud.currentTime); $('tbarDur').textContent = fmtTime(curAud.duration); updateMSPos(curAud.currentTime, curAud.duration); } });
                    return await doPlay(resume, s.name + ' · 🌐');
                } catch (e) { log('在线播放失败:', e); }
            }
            await makeBG(s); return false;
        }

        async function doPlay(resume, text) {
            return new Promise(res => {
                let done = false;
                const exec = async () => {
                    if (done) return; done = true;
                    try {
                        if (resume > 0 && Number.isFinite(resume)) curAud.currentTime = resume;
                        stopSessAudio();
                        await curAud.play();
                        if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';
                        $('curMode').textContent = esc(text);
                        await updateMS(); updMini(); showHint();
                        res(true);
                    } catch (e) { await makeBG(stages[cur]); res(false); }
                };
                exec();
                setTimeout(() => { if (!done) { done = true; makeBG(stages[cur]); res(false); } }, 5000);
            });
        }

        async function makeBG(s) {
            stopBG();
            await startSessAudio();
            try {
                const ctx = await ensureAC();
                bgOsc = ctx.createOscillator(); bgGain = ctx.createGain();
                bgOsc.connect(bgGain); bgGain.connect(ctx.destination);
                bgOsc.frequency.value = 80; bgGain.gain.value = mainVol * 0.03;
                bgOsc.start();
            } catch (e) {}
            startMetro(s.bpm);
            $('curMode').textContent = esc(s.name + ' · 节拍器');
            await updateMS(); updMini(); showHint();
        }

        // ============================================================
        // 5. 播放控制

        }

        // 定期更新 MediaSession positionState（锁屏进度条 + 控制按钮刷新）

            stopPosTimer();

                if (!playing) return;
                const dur = curAud?.duration || stages[cur]?.duration || 300;
                const pos = curAud?.currentTime || total;
                updateMSPos(pos, dur);
            }, 1000);
        }
        function stopPosTimer() { if (_posTimer) { clearInterval(_posTimer); _posTimer = null; } }

        async function doPlayAll() {
            log('=== PLAY ===');
            playing = true;
            updatePlayBtn();

            saved = 0;

            // 1. 必须先启动音频！系统需要先检测到音频焦点变化
            //    MediaSession 必须在音频播放之后设置才有效
            await startSessAudio();

            // 2. 初始化 MediaSession（handler 注册）
            if (!msInit) await initMediaSession();

            // 3. 播放训练音频/节拍器
            try { await playMusic(cur, saved); } catch (e) { await makeBG(stages[cur]); }

            // 4. 音频播放成功后，设置 MediaSession 元数据
            //    此时系统已检测到音频焦点，MediaSession 通知会显示控制按钮
            await updateMS();

            // 5. 启动定时器
            startPosTimer();
            loop = setInterval(() => { if (!playing) return; total++; updateDisp(); if (total - stageStart(cur) >= (stages[cur]?.duration || 300)) nextStage(); }, 1000);

            reqWL(); showHint(); updateDiag();
            $('msHint')?.classList.add('show');
            setTimeout(() => $('msHint')?.classList.remove('show'), 5000);
        }

        async function doPause() {

            if (loop) clearInterval(loop);
            stopPosTimer();
            if (curAud) { saved = curAud.currentTime; curAud.pause(); }
            stopMetro(); stopSessAudio();
            if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
            releaseWL(); saveState(); updateDiag();
            await updateMS();
        }

        function nextStage() { if (cur < stages.length - 1) switchTrack(cur + 1); else complete(); }
        function complete() { doPause(); stopAll(); stopSessAudio(); record(); $('stTitle').textContent = '🎉 完成！'; cur = 0; total = 0; saved = 0; updateDisp(); updateStage(); updMini(); $('tbarFill').style.width = '0%'; if ($('tbarDot')) $('tbarDot').style.left = '0%'; updatePlayBtn(); $('curMode').textContent = '准备开始'; initPl(); saveState(); releaseWL(); }
        function resetAll() { doPause(); stopAll(); stopSessAudio(); cur = 0; total = 0; saved = 0; updateDisp(); updateStage(); updMini(); updatePlayBtn(); $('tbarFill').style.width = '0%'; if ($('tbarDot')) $('tbarDot').style.left = '0%'; $('tbarCur').textContent = '00:00'; $('curMode').textContent = '准备开始'; initPl(); saveState(); releaseWL(); }
        function switchTrack(i) { if (i === cur && !playing) { togglePlay(); return; } const was = playing; if (playing) doPause(); cur = i; saved = 0; updateStage(); updMini(); if (was) setTimeout(() => doPlayAll(), 150); else playMusic(cur).then(() => { if (curAud && !playing) curAud.pause(); }); saveState(); }

            try { const d = JSON.parse(localStorage.getItem(KEYS.STATE)); if (d) { cur = d.cur || 0; total = d.total || 0; saved = d.saved || 0; d.meta?.forEach((m, i) => { if (m) meta[i] = m; }); } } catch (e) {}

        function getChartData(t) { const labels = [], data = [], now = new Date(); if (t === 'weekly') { for (let i = 6; i >= 0; i--) { const d = new Date(now); d.setDate(d.getDate() - i); labels.push(d.toLocaleDateString('zh-CN', { weekday: 'short' })); data.push(stats.daily[d.toISOString().split('T')[0]] || 0); } } else if (t === 'monthly') { for (let i = 3; i >= 0; i--) { const e = new Date(now); e.setDate(e.getDate() - i * 7); const s = new Date(e); s.setDate(s.getDate() - 6); let c = 0; for (let d = new Date(s); d <= e; d.setDate(d.getDate() + 1)) c += stats.daily[d.toISOString().split('T')[0]] || 0; labels.push((s.getMonth() + 1) + '/' + s.getDate()); data.push(c); } } else { for (let i = 11; i >= 0; i--) { const d = new Date(now.getFullYear(), now.getMonth() - i, 1); let c = 0; for (let day = 1; day <= 31; day++) c += stats.daily[d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0')] || 0; labels.push((d.getMonth() + 1) + '月'); data.push(c); } } return { labels, datasets: [{ data, backgroundColor: '#00d4aa', borderRadius: 6 }] }; }

            renderRows(); initPl(); updateStage(); updateDisp(); updMini();
            renderStagePills();
            updateStats(); initChart(); updateChart();
            updatePlayBtn();
            bind();

            // 用户手势激活音频上下文 + 预初始化 MediaSession
            const activate = async () => {
                log('👆 用户手势激活');
                await ensureAC();
                getSessAudio(); // 预创建
                // 立即初始化 MediaSession，这样耳机连接时 handler 已经就绪
                if (!msInit) await initMediaSession();
                // 设置初始元数据激活媒体会话
                await updateMS();
                document.removeEventListener('touchstart', activate);
                document.removeEventListener('click', activate);
            };
            document.addEventListener('touchstart', activate, { once: true, passive: true });
            document.addEventListener('click', activate, { once: true, passive: true });

            setInterval(() => { if (auto && playing) saveState(); }, 15000);
            window.addEventListener('beforeunload', () => { if (auto) saveState(); });
            if ('Notification' in window && Notification.permission === 'default') setTimeout(() => Notification.requestPermission(), 3000);

            log('初始化完成');
        }

        // 暴露全局
        window.app = { togglePlay, reset: resetAll, exportData, clearAll, prevTrack, nextTrack, switchTrack, showDiag: () => { $('diag').classList.toggle('show'); if ($('diag').classList.contains('show')) updateDiag(); }, get version() { return VER; } };

        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
        else init();
    })();
    </script>
</body>
</html>
