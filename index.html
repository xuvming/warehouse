<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🧠 神经重塑 · 终极控制器</title>

    <!-- PWA核心配置 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="神经重塑">

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        :root { 
            --primary-green: #00d4aa; 
            --primary-blue: #00a8e8; 
            --bg-dark: #1a1a2e; 
            --bg-light: #16213e; 
            --text-main: #fff; 
            --text-secondary: #b0c4de; 
            --text-muted: #6c7a9e; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; 
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-light) 100%); 
            min-height: 100vh; 
            color: var(--text-main); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px 12px 100px; 
        }

        /* --- 新增：安装按钮样式 --- */
        .install-btn-container {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            transition: all 0.3s ease;
            opacity: 0;
            pointer-events: none;
        }
        .install-btn-container.show {
            opacity: 1;
            pointer-events: auto;
        }
        .install-btn {
            background: linear-gradient(90deg, var(--primary-green), var(--primary-blue));
            color: #121212;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 212, 170, 0.4);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .install-btn:hover {
            transform: scale(1.05);
        }

        .header { text-align: center; margin-bottom: 16px; margin-top: 60px; }
        .header h1 { 
            font-size: 26px; 
            background: linear-gradient(90deg, var(--primary-green), var(--primary-blue)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            font-weight: 600; 
        }
        .save-status, .copy-toast { 
            position: fixed; 
            top: 16px; 
            right: 16px; 
            background: rgba(0, 212, 170, 0.15); 
            border: 1px solid var(--primary-green); 
            border-radius: 30px; 
            padding: 6px 16px; 
            font-size: 12px; 
            color: var(--primary-green); 
            opacity: 0; 
            transition: opacity 0.3s; 
            z-index: 1000; 
            backdrop-filter: blur(4px); 
        }
        .copy-toast { 
            top: auto; 
            bottom: 80px; 
            right: 50%; 
            transform: translateX(50%); 
            color: #121212; 
            background: var(--primary-green); 
        }
        .save-status.show, .copy-toast.show { opacity: 1; }
        
        .music-status { 
            background: rgba(0,212,170,0.08); 
            border: 1px solid var(--primary-green); 
            border-radius: 20px; 
            padding: 12px 20px; 
            margin-bottom: 18px; 
            max-width: 420px; 
            width: 100%; 
            text-align: center; 
        }
        .file-input { 
            background: rgba(255,255,255,0.03); 
            border-radius: 20px; 
            padding: 16px; 
            width: 100%; 
            max-width: 420px; 
            margin-bottom: 16px; 
            border: 1px solid rgba(0,212,170,0.25); 
        }
        .file-row { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            margin-bottom: 10px; 
            padding: 12px 10px; 
            background: rgba(0,0,0,0.2); 
            border-radius: 14px; 
            cursor: pointer; 
            transition: background 0.2s; 
        }
        .file-row:hover { background: rgba(0,212,170,0.08); }
        .file-info { flex: 1; pointer-events: none; }
        .file-name { color: var(--text-secondary); font-size: 14px; font-weight: 500; }
        .file-name.loaded { color: var(--primary-green); }
        .file-meta { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
        .config-btn { 
            padding: 8px 16px; 
            background: rgba(0, 168, 232, 0.2); 
            border: 1px solid var(--primary-blue); 
            border-radius: 30px; 
            color: var(--primary-blue); 
            cursor: pointer; 
            font-size: 13px; 
            font-weight: 600; 
            white-space: nowrap; 
        }
        .progress-ring { 
            width: 160px; 
            height: 160px; 
            position: relative; 
            margin: 0 auto 16px; 
        }
        .progress-ring svg { transform: rotate(-90deg); }
        .progress-ring circle { fill: none; stroke-width: 8; }
        .progress-ring .bg { stroke: #2d3748; }
        .progress-ring .progress { stroke: url(#gradient); stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
        .time-display { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            text-align: center; 
        }
        .time-display .current { font-size: 38px; font-weight: 700; color: var(--primary-green); }
        
        /* 底部播放器 */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0, 212, 170, 0.2);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 999;
        }
        .player-info { flex: 1; overflow: hidden; }
        .player-title { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-subtitle { font-size: 12px; color: var(--text-muted); }
        .player-controls { display: flex; gap: 8px; }
        .ctrl-btn { 
            width: 44px; 
            height: 44px; 
            border-radius: 50%; 
            border: none; 
            background: rgba(255,255,255,0.1); 
            color: var(--text-main); 
            font-size: 18px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .ctrl-btn.play { background: linear-gradient(135deg, var(--primary-green), var(--primary-blue)); width: 56px; height: 56px; }
    </style>
</head>
<body>

    <!-- 新增：自定义安装按钮容器 -->
    <div class="install-btn-container" id="installContainer">
        <button class="install-btn" id="installBtn">
            <span>⭐</span> 添加到主屏幕 (PWA安装)
        </button>
    </div>

    <div class="header">
        <h1>🧠 神经重塑 · 终极控制器</h1>
    </div>

    <div class="save-status" id="saveStatus">状态已保存</div>
    <div class="copy-toast" id="copyToast">已复制到剪贴板</div>

    <div class="music-status">
        底部迷你播放器 · 始终可见
    </div>

    <div class="file-input">
        <div style="font-weight: 600; margin-bottom: 10px; color: var(--text-secondary); display: flex; align-items: center; gap: 6px;">
            <span>🎵</span> 训练曲目 · 点击行复制 | 点击「配置」调整
        </div>
        
        <div class="file-row">
            <div class="file-info">
                <div class="file-name loaded">1. 将军令（琵琶纯音乐）</div>
                <div class="file-meta">🌐 链接 · 05:00</div>
            </div>
            <button class="config-btn">⚙️ 配置</button>
        </div>
        
        <div class="file-row">
            <div class="file-info">
                <div class="file-name">2. 醉拳（纯音乐版）</div>
                <div class="file-meta">🌐 链接 · 07:00</div>
            </div>
            <button class="config-btn">⚙️ 配置</button>
        </div>
        
        <div class="file-row">
            <div class="file-info">
                <div class="file-name">3. 流水（古琴）</div>
                <div class="file-meta">🌐 链接 · 06:00</div>
            </div>
            <button class="config-btn">⚙️ 配置</button>
        </div>
        
        <div class="file-row">
            <div class="file-info">
                <div class="file-name">4. 笑傲江湖（纯音乐）</div>
                <div class="file-meta">🌐 链接 · 06:00</div>
            </div>
            <button class="config-btn">⚙️ 配置</button>
        </div>
    </div>

    <!-- 底部播放器模拟 -->
    <div class="player-bar">
        <div class="player-info">
            <div class="player-title">坐立战马</div>
            <div class="player-subtitle">将军令（琵琶纯音乐）</div>
        </div>
        <div class="player-controls">
            <button class="ctrl-btn">⏮️</button>
            <button class="ctrl-btn play">▶️</button>
            <button class="ctrl-btn">⏭️</button>
        </div>
    </div>

    <script>
        // --- 新增：PWA 自定义安装逻辑 ---
        let deferredPrompt;
        const installContainer = document.getElementById('installContainer');
        const installBtn = document.getElementById('installBtn');

        // 1. 监听浏览器的 beforeinstallprompt 事件
        window.addEventListener('beforeinstallprompt', (e) => {
            // 阻止浏览器默认的安装提示（这样地址栏的小加号就不会自动出现，我们自己控制）
            e.preventDefault();
            // 保存这个事件对象，以便稍后触发
            deferredPrompt = e;
            // 显示我们自定义的明显按钮
            installContainer.classList.add('show');
            console.log('PWA 安装条件已满足，显示自定义安装按钮');
        });

        // 2. 点击自定义按钮时触发安装
        installBtn.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            
            // 显示浏览器的安装弹窗
            deferredPrompt.prompt();
            
            // 等待用户选择（安装或取消）
            const { outcome } = await deferredPrompt.userChoice;
            
            if (outcome === 'accepted') {
                console.log('用户接受了 PWA 安装');
                installContainer.classList.remove('show'); // 安装后隐藏按钮
            } else {
                console.log('用户拒绝了 PWA 安装');
            }
            
            // 事件只能用一次，释放掉
            deferredPrompt = null;
        });

        // 3. 当应用已经安装后，也会触发这个事件，此时隐藏按钮
        window.addEventListener('appinstalled', () => {
            console.log('PWA 已安装');
            installContainer.classList.remove('show');
            deferredPrompt = null;
        });

        // --- 原有页面的简单交互演示 ---
        document.querySelectorAll('.file-row').forEach(row => {
            row.addEventListener('click', () => {
                alert('点击了曲目行，可在这里实现播放逻辑');
            });
        });
    </script>

</body>
</html>
